# Minimum RAM in GB (warn below, fail below MIN_RAM_FAIL)
MIN_RAM_GB_WARN=1
MIN_RAM_GB_FAIL=0

# Expected CPU count (0 = skip count check)
EXPECTED_CPU_COUNT=0

# GPU dmesg pattern (empty = generic DRM check only)
GPU_DMESG_PATTERN=""

# Network: minimum interface count (0 = skip)
MIN_ETH_INTERFACES=0

# Temperature thresholds (millidegrees Celsius)
TEMP_CPU_WARN=70000
TEMP_CPU_FAIL=85000

# Sky1-specific module list for smoke test (space-separated, empty = skip)
MODULE_SMOKE_TEST=""

# GPU: expected DRM driver name (empty = report only, no fail)
GPU_EXPECTED_DRIVER=""
# GPU: space-separated modules that must be loadable via modprobe -n
GPU_EXPECTED_MODULES=""
